name: Update meal data

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: meal-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - name: Crawl and export
        run: npm run export -- --output "$RUNNER_TEMP/snu-meal-data"
      - name: Publish data branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan data-publish
          git rm -rf --ignore-unmatch .
          cp -R "$RUNNER_TEMP/snu-meal-data/." .
          git add --all
          git commit -m "Update meal data"
          git push --force origin HEAD:data
