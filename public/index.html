<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f2d52" />
    <meta name="description" content="서울대학교 교내 식당의 아침, 점심, 저녁 메뉴를 확인하세요." />
    <title>서울대 학식</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <div class="page-shell" id="app" aria-busy="true">
      <header class="site-header">
        <div class="header-inner">
          <div class="brand-block">
            <p class="brand-kicker">SEOUL NATIONAL UNIVERSITY</p>
            <h1>서울대 학식 정보</h1>
          </div>
          <div class="data-note" aria-label="데이터 업데이트 정보">
            <p class="data-status" id="data-status">최신 메뉴 확인 중</p>
          </div>
        </div>
      </header>

      <main>
        <section class="content" id="content" aria-live="polite"></section>
      </main>

      <section class="control-bar" aria-label="메뉴 조회 조건">
        <div class="control-inner">
          <div class="date-picker" id="date-picker" aria-label="날짜 선택"></div>
          <div class="control-row">
            <div class="type-picker" id="type-picker" role="group" aria-label="식사 시간"></div>
            <label class="fixed-control" for="fixed-toggle">
              <span class="toggle-copy">
                <strong>상시 메뉴</strong>
              </span>
              <input id="fixed-toggle" type="checkbox" />
              <span class="toggle-track" aria-hidden="true"><span></span></span>
            </label>
          </div>
        </div>
      </section>

      <footer class="site-footer">
        <p>식단과 가격은 식당 사정에 따라 달라질 수 있습니다.</p>
      </footer>
    </div>
    <noscript>메뉴를 확인하려면 JavaScript를 활성화해 주세요.</noscript>
  </body>
</html>
