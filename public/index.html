<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f2d52" />
    <meta name="description" content="서울대학교 교내 식당의 아침, 점심, 저녁 메뉴를 확인하세요." />
    <title>서울대 학식</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <div class="page-shell" id="app" aria-busy="true">
      <header class="site-header">
        <div class="header-inner">
          <div class="brand-block">
            <p class="brand-kicker">SEOUL NATIONAL UNIVERSITY</p>
            <h1>서울대 학식</h1>
            <p class="brand-description">관악캠퍼스의 아침, 점심, 저녁 메뉴를 확인하세요.</p>
          </div>
          <div class="data-note" aria-label="데이터 업데이트 정보">
            <p class="data-status" id="data-status">최신 메뉴 확인 중</p>
          </div>
        </div>
      </header>

      <main>
        <section class="selection-panel" aria-label="메뉴 조회 조건">
          <div class="date-section">
            <div class="section-label-row">
              <h2 class="control-label">날짜</h2>
              <span class="scroll-hint" aria-hidden="true">가로로 넘겨보세요</span>
            </div>
            <div class="date-picker" id="date-picker" aria-label="날짜 선택"></div>
          </div>

          <div class="filter-row">
            <div class="meal-type-filter">
              <span class="control-label" id="meal-type-label">식사</span>
              <div
                class="type-picker"
                id="type-picker"
                role="group"
                aria-labelledby="meal-type-label"
              ></div>
            </div>
            <label class="fixed-control" for="fixed-toggle">
              <span class="toggle-copy">
                <strong>상시 메뉴 포함</strong>
                <small>푸드코트 등 고정 메뉴</small>
              </span>
              <input id="fixed-toggle" type="checkbox" />
              <span class="toggle-track" aria-hidden="true"><span></span></span>
            </label>
          </div>
        </section>

        <section class="content" id="content" aria-live="polite"></section>
      </main>

      <footer class="site-footer">
        <p>식단과 가격은 식당 사정에 따라 달라질 수 있습니다.</p>
      </footer>
    </div>
    <noscript>메뉴를 확인하려면 JavaScript를 활성화해 주세요.</noscript>
  </body>
</html>
